name: Build iOS Framework

on:
  push:
    branches: [ Alpha ]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '!.github/workflows/build-ios.yml'
  pull_request:
    branches: [ Alpha ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Framework
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Verify Dependencies
        run: go mod verify

      - name: Setup Build Environment
        run: |
          echo "Setting up build environment..."
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> $GITHUB_ENV
          echo "SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)" >> $GITHUB_ENV

      - name: Build Framework
        run: |
          export GOARCH=arm64
          export GOOS=ios
          export CGO_ENABLED=1
          export CC=$(xcrun -sdk iphoneos -find clang)
          export CXX=$(xcrun -sdk iphoneos -find clang++)
          export SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          mkdir -p build
          
          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'main.Version=$(git describe --tags)'"
          LDFLAGS="${LDFLAGS} -X 'main.BuildTime=$(date -u '+%Y-%m-%d %I:%M:%S %Z')'"
          
          gomobile bind \
            -target=ios \
            -iosversion=12.0 \
            -prefix=Mihomo \
            -o build/Mihomo.xcframework \
            -ldflags="${LDFLAGS}" \
            -trimpath \
            -v \
            ./experimental/libbox

      - name: Validate Framework
        run: |
          if [ ! -d "build/Mihomo.xcframework" ]; then
            echo "Framework build failed!"
            exit 1
          fi
          
          ls -R build/Mihomo.xcframework

      - name: Upload Framework
        uses: actions/upload-artifact@v3
        with:
          name: Mihomo.xcframework
          path: build/Mihomo.xcframework
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/Mihomo.xcframework
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
